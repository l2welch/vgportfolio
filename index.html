<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
<meta charset="UTF-8">
<title>Stick Man Portfolio</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
  }

  /* Game container (viewport) */
  #game {
    width: 100vw;
    height: 100vh;
    background: #eef;
    position: relative;
    overflow: hidden;
  }

  /* World that moves */
  #world {
    position: absolute;
    height: 100%;
    width: 3000px; /* big horizontal world */
  }

  /* Stick man (centered) */
 #player {
  position: absolute;
  left: 50%;
  bottom: 20%;
  width: 80px;
  height: 80px;
  object-fit: contain;
  object-position: bottom; 
  transform: translateX(-50%);
}

  /* Ground */
 #ground {
  position: absolute;
  bottom: 0;
  left: -100px;
  width: 100%;
  height: 20%;
  background: #333;
  }

  /* Trigger box */
  .trigger {
    position: absolute;
    bottom: 150px;
    width: 400px;
    height: 200px;
    background: #eef;
    text-align: center;
    font-size: 100px;
    font-family: 'Bitcount Grid Double', monospace;
  }

  /* Name Text Box */
  .name {
  position: absolute;
  bottom: 55%;
  left: -25%;
  font-family: 'Barlow Condensed', monospace;
  font-size: 250px;
  }

  body {
  margin: 0;
  overflow: hidden;
  opacity: 1;
  transition: opacity 0.6s ease;
}

/* When fading out */
body.fade-out {
  opacity: 0;
}

  #speechBubble {
  position: absolute;
  left: 50%;
  bottom: 45%; /* above player */
  transform: translateX(-50%);
  background: #eef;
  padding: 15px 20px;
  border-radius: 12px;
  border-width: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  text-align: center;
  pointer-events: none; /* clicks go through */
}

#speechMain {
  font-size: 24px;
  color: #111;
}

#speechSub {
  font-size: 14px;
  color: #777;
  margin-top: 5px;
}
 
</style>
</head>

<body>

<div id="game">

  <div id="speechBubble">
  <div id="speechMain">Hello! Welcome to my website!</div>
  <div id="speechSub">click anywhere</div>
</div>
  
  <div id="world">
    
    <!-- Trigger -->
    <div class="trigger" id="aboutBox" style="left: 10%; color: #333;">
      ABOUT
    </div>

    <div id="ground"></div>

    <div class="name">
    LIVIA WELCH
    </div>
    <div class="name" style="bottom: 52%; left: -24.5%; font-size: 50px;">
    Tech & Design Portfolio 2026
    </div>
    
  </div>

  <!-- Player stays centered -->
  <img id="player" src="run1.png">
</div>

<script>
/* ---------------------------
   BASIC VARIABLES
----------------------------*/

let playerX = 0;        // horizontal position in world
let playerY = 0;        // vertical position (jumping)
let velocityY = 0;      // jump speed
let gravity = 0.6;
let isJumping = false;

let speed = 6;

const world = document.getElementById("world");
const player = document.getElementById("player");
const aboutBox = document.getElementById("aboutBox");

let frame = 0;
let frameTimer = 0;
let frameDelay = 5;

 let transitioning = false;
  
/* ---------------------------
   SPEECH BUBBLE
----------------------------*/

const speechMain = document.getElementById("speechMain");
const speechSub = document.getElementById("speechSub");
const speechBubble = document.getElementById("speechBubble");

let dialogue = [
  "Hello! Welcome to my website!",
  "Use arrow keys to move",
  "Jump into ABOUT to learn more about me"
];

let dialogueIndex = 0;

document.addEventListener("click", () => {
  dialogueIndex++;

if (dialogueIndex < dialogue.length) {
    speechMain.textContent = dialogue[dialogueIndex];
  } else {
    speechBubble.style.display = "none"; // hide after last message
  }
});

/* ---------------------------
   MOVEMENT - INPUTS
----------------------------*/

let keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.code] = true;

  // Jump
  if (e.code === "Space" && !isJumping) {
    velocityY = -15;
    isJumping = true;
  }
});

document.addEventListener("keyup", (e) => {
  keys[e.code] = false;
});

/* ---------------------------
   MOVEMENT - LOOPS
----------------------------*/

function update() {

  /* ---- Horizontal movement ---- */
  if (keys["ArrowRight"]) {
    playerX += speed;
  }
  if (keys["ArrowLeft"]) {
    playerX -= speed;
  }

  /* ---- Gravity / Jump ---- */
  velocityY += gravity;
  playerY += velocityY;

  // Ground collision
  if (playerY > 0) {
    playerY = 0;
    velocityY = 0;
    isJumping = false;
  }
  
  let moving = keys["ArrowRight"] || keys["ArrowLeft"];

if (moving) {
  frameTimer++;

  if (frameTimer > frameDelay) {
    frame = (frame + 1) % 2;
    frameTimer = 0;

    player.src = frame === 0 ? "run1.png" : "run2.png";
  }
} else {
  frame = 0;
  player.src = "idle.png";
}

 let direction = 1;

if (keys["ArrowLeft"]) direction = -1;
if (keys["ArrowRight"]) direction = 1;

player.style.transform = `
  translateX(-50%)
  translateY(${playerY}px)
  scaleX(${direction})
`;

  /* ---- Move world (camera effect) ---- */
  let screenCenter = window.innerWidth / 2;
world.style.transform = `translateX(${screenCenter - playerX}px)`;


  /* ---- Interaction check ---- */
  checkInteraction();

  requestAnimationFrame(update);
}

update();

/* ---------------------------
   INTERACTION LOGIC
----------------------------*/

function checkInteraction() {
  let boxLeft = aboutBox.offsetLeft;
  let boxRight = boxLeft + aboutBox.offsetWidth;

  let playerLeft = playerX - 15;
  let playerRight = playerX + 15;

  let isOverlapping = playerRight > boxLeft && playerLeft < boxRight;

  // Correct condition
  if (isOverlapping && isJumping && !transitioning) {
    startFadeTransition("about.html");
  }
}

function startFadeTransition(targetPage) {
  if (transitioning) return;
  transitioning = true;

  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = targetPage;
  }, 600);
}
</script>

</body>
</html>
